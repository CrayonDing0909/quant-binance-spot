  review_summary: "Why On-chain not OI: slightly lower standalone uplift than OI, but materially stronger evidence stack and already passed full validation. Why not Macro: positive but weaker and stacking degradation was the worst. Why not VPIN: strongest orthogonality, but standalone benefit was too small to lead the shortlist."
