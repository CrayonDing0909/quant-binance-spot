decision:
  gap: Existing evidence suggests HTF is not best-in-class on standalone performance, but replacing it is an architecture-level change that should only happen after the live observation window and a dedicated validation pass.
  archetype: filter_replacement_synthesis
  integration_mode: filter_replacement_candidate
  success_criteria:
    - Rank candidates by standalone strength, robustness, and expected replacement risk.
    - Prefer candidates that improve standalone Sharpe without severe evidence gaps.
    - Avoid turning replacement research into another stacking exercise.
  kill_criteria:
    - No candidate materially outperforms HTF after standalone review.
    - The shortlist relies on stale evidence or unresolved architecture risk.
  hypothesis: One of the preserved regime filters is likely more suitable as a full HTF replacement than as a stacked filter, but the best candidate should be selected before any new implementation effort.
  data_requirements:
    - Existing OI, On-chain, Macro, and VPIN research summaries
    - Existing ablation and validation results already captured in the repo
  coverage_gate: Sufficient for synthesis because all four candidates already have completed EDA/ablation records in the repo.
  eda_findings:
    - OI had the strongest standalone uplift versus HTF (+6.7%) but failed the incremental promotion threshold and would require architecture-level replacement validation.
    - On-chain had the best evidence quality package: strongest validated signal quality, standalone SR +5.3%, and full validation already passed.
    - Macro was directionally strong but weaker than On-chain on standalone uplift and stacked the worst with HTF (-9.8%).
    - VPIN was the most orthogonal candidate and stacked least badly, but its standalone uplift (+3.5%) was weaker than OI, On-chain, and Macro.
  handoff_recommendation: maintain_baseline_now_prepare_onchain_first_replacement_shortlist
  final_outcome: shortlist_completed_keep_baseline
blockers:
  - kind: observation_window_gate
    reason: Production observation window for the current 6-symbol candidate runs through 2026-03-18, so replacement should not be rushed mid-observation.
