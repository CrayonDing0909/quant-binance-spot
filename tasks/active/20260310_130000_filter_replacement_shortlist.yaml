notes:
  - This task reused existing research instead of launching new EDA.
  - Recommendation is a shortlist and sequencing decision, not a promotion decision.
  - Existing memory pattern remains intact: standalone can beat HTF while stacking still over-filters.
next_recommended_action: Keep the current HTF baseline during the observation window; if replacement research is reopened after 2026-03-18, evaluate On-chain first, OI second, Macro third, VPIN fourth.
final_packet:
  recommendation: "Shortlist `On-chain` as the first HTF replacement candidate, with `OI` second, `Macro` third, and `VPIN` fourth. Maintain the current HTF baseline for now."
  evidence_tier: "synthesis_complete / replacement_not_yet_authorized"
  blocker_summary: "This is an architecture-level change and the live observation window is still open, so the correct action is shortlist now, validate later."
