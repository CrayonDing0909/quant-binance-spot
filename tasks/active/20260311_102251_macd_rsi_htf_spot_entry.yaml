decision:
  gap: The current repo is optimized around futures-first trend systems, so it lacks an explicitly researched low-frequency recovery-entry archetype that behaves more like a weekly reversal detector than a trend follower.
  archetype: weekly_histogram_reversal_entry
  integration_mode: standalone_spot_entry_candidate
  success_criteria:
    - Confirm the TradingView Pine logic can be reproduced causally with weekly-open labels and next-bar execution.
    - Show that the main `buycondition` has better quality than the looser ATR add-on branch.
    - Establish whether the edge survives outside a small number of alt-led recovery windows before any handoff claim.
  kill_criteria:
    - The faithful Pine replication collapses once tested outside a few rebound windows or outside alt-heavy names.
    - BTC/ETH-only evidence remains too weak to justify a broad crypto accumulation thesis.
    - The ATR add-on proves to be mostly noise and the core `buycondition` fails robustness checks after concentration analysis.
  hypothesis: Weekly RSI oversold followed by a MACD histogram local-bottom reversal can identify early crypto recovery windows sooner than a strict MACD line golden cross.
  data_requirements:
    - Binance futures and spot OHLCV history with enough daily lookback to build TradingView-style weekly bars
    - At minimum, local `1d` data for BTCUSDT, ETHUSDT, SOLUSDT, DOGEUSDT, AVAXUSDT, LINKUSDT
    - Optional longer BTC history via non-Binance sources only if needed to test pre-2017 persistence
  coverage_gate: Passed for the crypto-first pilot universe after local spot bootstrap and existing futures coverage. Coverage is sufficient for initial Pine replication on weekly bars.
  eda_findings:
    - The user-provided TradingView logic is not a strict MACD golden cross; it is `RSI[1] < 30` plus a weekly MACD histogram reversal.
    - TradingView-style weekly Monday-open labels reproduce the BTC `2022-07-04` signal on both futures and spot data.
    - After correcting execution timing to the next weekly open, the main `buycondition` still remains positive in both futures and spot aggregates.
    - The main `buycondition` is materially stronger than the ATR add-on branch in both futures and spot first-pass EDA.
    - BTC/ETH-only and post-2021 slices remain positive overall, but BTC itself is much weaker than ETH and the strongest outcomes are still concentrated in rebound windows.
    - Concentration-bucket analysis suggests the signal behaves more like an ETH/majors recovery-entry heuristic than a BTC-led macro timing rule.
    - Cross-asset expansion shows the same faithful weekly logic is not limited to crypto: broad US ETFs and Taiwan proxies are also directionally positive, although with much smaller magnitude than crypto.
    - Relative-to-baseline analysis shows the signal can function as an active accumulation trigger on some long-term assets (for example `SPY`, `IWM`, `SOXX`, `2330.TW`), but it does not improve on passive weekly buying for BTC.
    - The earlier strict monthly interpretation should be considered superseded for this task.
  handoff_recommendation: continue_alpha_research_no_handoff
  final_outcome: null
