decision:
  gap: "Slow feedback loop — 1h trend strategy yields ~2-5 trades/week, insufficient for rapid iteration; bleeding during chop regimes"
  archetype: "mean_reversion + event_driven (higher frequency complement)"
  integration_mode: "standalone_satellite"
  success_criteria:
    - "Post-cost SR > 0.5 at primary timeframe"
    - "corr < 0.3 with production TSMOM signal"
    - "Trades/year > 200 per symbol for meaningful feedback"
    - "Gross expectancy per trade > 0 (MR Iron Rule)"
    - "Cost stress 2x still positive"
  kill_criteria:
    - "Gross PnL/trade < 0 before costs (MR archetype kill)"
    - "corr > 0.5 with production (no diversification value)"
    - "Post-cost SR < 0 at 1x cost (net alpha negative)"
    - "All candidate directions FAIL → pivot to pair spread research"
  hypothesis: |
    Production TSMOM bleeds during chop regimes and provides slow feedback (~2-5 trades/week).
    A higher-frequency complement strategy targeting DIFFERENT market behavior (mean-reversion,
    liquidity sweeps, event-driven reversals) at 15m-1h timeframe can:
    (a) provide 10-20x more trades for faster learning,
    (b) generate income during non-trending regimes,
    (c) improve portfolio diversification via low/negative correlation with TSMOM.

    Three candidate directions to evaluate:
    1. mean_revert_liquidity (15m liquidity sweep MR) — CODE EXISTS, never formally tested
    2. tsmom_mr_composite (1h TSMOM+MR+Reversal blend) — CODE EXISTS, never tested
    3. Crypto pair spread reversion (BTC/ETH etc.) — NOT IMPLEMENTED, genuinely new alpha

    Phase 0 parallel action: Implement LSR Contrarian satellite (already HANDOFF READY, separate task).

  data_requirements:
    - "15m klines for 6 production symbols (BTCUSDT, ETHUSDT, SOLUSDT, DOGEUSDT, AVAXUSDT, LINKUSDT)"
    - "1h klines (already available)"
    - "Funding rate data (already available)"
  coverage_gate: ">= 70% for 15m data, target >= 90%"
  eda_findings:
    - "15m MR Liquidity Sweep: FAIL — gross expectancy negative across all 3 symbols (BTC -0.002, ETH -0.002, SOL -0.004). MR Iron Rule violated. Win rate 26-29% (expected 55-70%). Crypto positive skew structurally kills absolute price MR at 15m. Diversification confirmed (corr -0.05 to -0.11) but alpha deeply negative."
    - "15m TSMOM Rescaled: FAIL — ~15K trades/yr per symbol (43/day, massive cost drag). Avg SR=0.262 (marginal). Correlation with prod 0.63-0.82 (no diversification). BTC negative SR. Essentially same signal as 1h but noisier and more expensive."
    - "Crypto Pair Spread (BTC/ETH, BTC/SOL, ETH/SOL): WEAK GO — IC(z_168h→24h) = +0.035 to +0.057 (all 3 pairs). Positive gross expectancy on all z-score variants (z1.5/z2.0/z2.5). BTC/ETH z2.0: 234 trades/yr, WR=38%, gross_exp=+0.007. CAVEAT: Hurst=0.97 (long-term trending), but short-term z-score deviations DO mean-revert around rolling window. Needs proper cost-adjusted hedged backtest."
  handoff_recommendation: "pair_spread_to_quant_developer"
  final_outcome: "2 directions FAIL, 1 direction WEAK GO (pair spread). LSR Contrarian satellite implementation parallel track."

