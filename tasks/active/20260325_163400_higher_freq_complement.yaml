  recommendation: |
    PAIR SPREAD is the only viable higher-frequency direction.
    BTC/ETH, BTC/SOL, ETH/SOL log-spread z-score shows IC=0.035-0.057
    and positive gross expectancy across all pairs/thresholds tested.
    ~60-350 trades/yr depending on pair and threshold (vs ~50 for current prod).
    Needs proper hedged-cost backtest to confirm net viability.

    LSR Contrarian satellite (separate task) adds ~105 trades/yr of uncorrelated alpha.
    Combined portfolio: prod TSMOM + LSR Contrarian + pair spread would provide
