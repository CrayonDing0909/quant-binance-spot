# 統一驗證配置
# 所有驗證設定集中在這裡
#
# 使用方式:
#   python scripts/validate.py -c config/rsi_adx_atr.yaml -v config/validation.yaml

# ══════════════════════════════════════════════════════════════════════════════
# Walk-Forward Analysis
# ══════════════════════════════════════════════════════════════════════════════
walk_forward:
  enabled: true
  n_splits: 5  # 分割數量

# ══════════════════════════════════════════════════════════════════════════════
# Monte Carlo Simulation
# ══════════════════════════════════════════════════════════════════════════════
monte_carlo:
  enabled: true
  n_simulations: 10000
  confidence_levels: [0.95, 0.99]

# ══════════════════════════════════════════════════════════════════════════════
# Cross-Asset Validation
# ══════════════════════════════════════════════════════════════════════════════
cross_asset:
  run_loao: true                    # Leave-One-Asset-Out
  run_correlation_stratified: true  # 相關性分層
  run_regime_validation: true       # 市場狀態

# ══════════════════════════════════════════════════════════════════════════════
# Prado Methods (Advanced)
# ══════════════════════════════════════════════════════════════════════════════
prado_methods:
  deflated_sharpe:
    enabled: true
    # n_trials 現在從 trial_registry.cumulative_n_trials 自動讀取
    # 若 trial_registry 不存在則回退到此值
    n_trials: 729  # Grid search 組合數（單策略參數敏感性）
  
  pbo:
    enabled: true
    threshold: 0.5  # PBO 閾值，超過此值視為過擬合
  
  cpcv:
    enabled: false  # 預設關閉（非常耗時）
    n_splits: 6
    n_test_splits: 2
    purge_pct: 0.01
    embargo_pct: 0.01

# ══════════════════════════════════════════════════════════════════════════════
# Consistency Check
# ══════════════════════════════════════════════════════════════════════════════
consistency:
  # disabled pre-deployment: 此檢查需要 live 交易紀錄，僅在部署後 14+ 天有 live data 時才啟用。
  # 在 observation period review 時手動啟用：
  #   PYTHONPATH=src python scripts/validate_live_consistency.py -c config/prod_candidate_simplified.yaml -v
  # 參見 .cursor/skills/validation/pipeline.md Step 9
  enabled: false
  days: 7         # 回看天數

# ══════════════════════════════════════════════════════════════════════════════
# Cost Stress Test（成本壓力測試）
# ══════════════════════════════════════════════════════════════════════════════
cost_stress:
  enabled: true
  multipliers: [1.5, 2.0]  # 1.5× 和 2× 成本
  pass_criteria: "sharpe_positive"  # 2× 成本下 SR 仍 > 0

# ══════════════════════════════════════════════════════════════════════════════
# Delay Stress Test（延遲壓力測試）
# ══════════════════════════════════════════════════════════════════════════════
delay_stress:
  enabled: true
  extra_delay_bars: 1       # 額外延遲 bar 數（signal_delay = 1 + 1 = 2）
  max_sharpe_drop_pct: 50   # SR drop < 50% → PASS

# ══════════════════════════════════════════════════════════════════════════════
# Market Regime Periods
# ══════════════════════════════════════════════════════════════════════════════
market_regimes:
  - name: "crypto_winter_2022"
    start: "2022-01-01"
    end: "2023-01-01"
    description: "2022 加密貨幣熊市"
  
  - name: "bull_market_2021"
    start: "2021-01-01"
    end: "2022-01-01"
    description: "2021 牛市"
  
  - name: "covid_crash_2020"
    start: "2020-03-01"
    end: "2020-04-01"
    description: "2020 COVID 崩盤"
  
  - name: "post_halving_2024"
    start: "2024-04-01"
    end: "2025-01-01"
    description: "2024 減半後行情"

# ══════════════════════════════════════════════════════════════════════════════
# Holdout Out-of-Sample Testing（保留樣本外測試）
# ══════════════════════════════════════════════════════════════════════════════
# 對每個 period：用 train 期間跑回測取得 IS SR，
# 再用 test 期間評估取得 OOS SR。若 OOS SR < IS SR × 0.5 → FAIL。
holdout_oos:
  enabled: true
  max_degradation: 0.5  # OOS SR < IS SR × (1 - max_degradation) → FAIL
  periods:
    - name: "full_history"
      train_start: "2017-08-17"  # BTC 上線
      train_end: "2023-12-31"
      test_start: "2024-01-01"
    
    - name: "recent"
      train_start: "2022-01-01"
      train_end: "2024-12-31"
      test_start: "2025-01-01"

# ══════════════════════════════════════════════════════════════════════════════
# Alpha Decay（因子衰減）
# ══════════════════════════════════════════════════════════════════════════════
# 監控信號品質是否在近期衰退，避免「回測有效、近期失效」。
#
# Governance spec: .cursor/skills/validation/alpha-decay-governance.md
# Owner: Quant Researcher (methodology) → Developer (impl) → Risk (action)
#
# Three-layer gate:
#   Gate A (quality):   avg recent IC >= recent_ic_min
#   Gate B (stability): avg decay <= max_decay_pct (with small-denominator guard)
#   Gate C (confidence): critical alerts <= max_critical_alerts
#
# TSMOM strategies have structurally low IC (~0.005-0.015).
# Do NOT set recent_ic_min > 0.02 for momentum strategies.
alpha_decay:
  enabled: true
  forward_bars: 24            # IC 前瞻收益計算視窗（1h=1天）
  window_days: 180            # rolling IC 計算窗口
  recent_days: 180            # recent vs historical 分段
  recent_ic_min: 0.005        # Gate A: TSMOM IC 結構性低，0.005 = noise floor
  max_decay_pct: 0.6          # Gate B: 60% decay 上限（小分母模式用絕對差）
  max_critical_alerts: 2      # Gate C: 容許 2 個幣種有暫時性問題
  min_ic_denominator: 0.01    # 小分母保護：|historical_ic| < 此值時改用絕對差

# ══════════════════════════════════════════════════════════════════════════════
# Red Flags（回測異常指標檢測）
# ══════════════════════════════════════════════════════════════════════════════
# 觸發時不代表策略一定有問題，但需要深入審查。
# Owner: Quant Researcher（定義門檻） → Developer（實作） → Researcher（審查）
red_flags:
  max_sharpe: 4.0           # SR > 4.0 → 極度可疑（look-ahead / overfitting）
  min_mdd_pct: 3.0          # MDD < 3% → 可能 look-ahead bias
  max_win_rate: 70.0        # 勝率 > 70% → 可能信號洩漏
  max_profit_factor: 5.0    # PF > 5.0 → 過於完美
  min_trades: 30            # 交易 < 30 → 統計推斷不可靠
  max_calmar: 20.0          # Calmar > 20 → 異常高 risk-adj return

# ══════════════════════════════════════════════════════════════════════════════
# Thresholds (驗證閾值)
# ══════════════════════════════════════════════════════════════════════════════
thresholds:
  # Walk-Forward
  max_sharpe_degradation: 0.5      # 最大 Sharpe 衰退
  
  # Monte Carlo
  max_var_95: -0.30                # 最大 VaR 95%
  max_cvar_95: -0.40               # 最大 CVaR 95%
  
  # Cross-Asset
  min_robustness_level: "moderate"  # robust, moderate, weak, overfitted
  
  # DSR
  min_deflated_sharpe: 0.0         # 最小校正 Sharpe
  
  # PBO
  max_pbo: 0.5                     # 最大 PBO
  
  # Consistency
  min_consistency_rate: 0.95       # 最小一致性

# ══════════════════════════════════════════════════════════════════════════════
