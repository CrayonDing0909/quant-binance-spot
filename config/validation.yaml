# ══════════════════════════════════════════════════════════════════════════════
# Factor Orthogonality（因子正交性審計）
# ══════════════════════════════════════════════════════════════════════════════
# 用於偵測因子冗餘（同一因子穿不同衣服）。
# Owner: Quant Researcher（定義門檻） → Alpha Researcher（EDA pre-screen）
#
# 歷史教訓：OI/On-chain/Macro/VPIN 4 個 filter 都通過傳統 G1-G6 gates，
# 但都是 HTF 的冗餘版本（regime quality gate）。如果當時有 R² 檢查，
# 可以在 EDA 階段就 kill 冗餘方向，省下 ~16h 開發者時間。
factor_orthogonality:
  enabled: true
  # R² 門檻：候選信號被既有因子解釋的比例
  # > 此值 → 判定為冗餘（不 handoff）
  r_squared_threshold: 0.50
  # PCA 解釋變異門檻
  pca_variance_threshold: 0.95
  # PC loading 門檻：候選在某 PC 上的 loading > 此值 → 冗餘
  loading_threshold: 0.70
  # 冗餘叢集門檻：信號間 |corr| > 此值歸為同一叢集
  cluster_corr_threshold: 0.30
  # Regime 集中度門檻：單一 regime 貢獻 > 此值 → regime 依賴
  regime_concentration_threshold: 0.70

# ══════════════════════════════════════════════════════════════════════════════
# Data Embargo（研究數據隔離 — 確保真 OOS）
# ══════════════════════════════════════════════════════════════════════════════
# 目的：所有 research scripts 只能使用 embargo cutoff 之前的數據進行研究。
# embargo 區間內的數據保留為純粹的 holdout，在 validation 階段才使用。
# 這是防止「已看過所有數據」問題的唯一有效措施。
#
# 使用方式：
#   from qtrade.validation.embargo import load_embargo_config, enforce_temporal_embargo
#   embargo = load_embargo_config("config/validation.yaml")
#   df = enforce_temporal_embargo(df, embargo)  # 自動截斷
#
data_embargo:
  # ── 時間 Embargo ──
  # 鎖住最近 N 個月的數據，研究只能用 cutoff 之前的資料。
  # Validation 的 holdout test 用 embargo 區間做最終 OOS 評估。
  temporal:
    enabled: true
    embargo_months: 3        # ~2160 bars at 1h，足夠統計意義
    # 研究用數據截止：now() - embargo_months
    # 例：today=2026-03-02 → cutoff=2025-12-02 → 研究只能用到 2025-12-02

  # ── 幣種 Embargo ──
  # 保留 1-2 個 symbol 完全不參與研究/ablation。
  # 最後用 embargo symbols 做 cross-symbol OOS 驗證。
  # 選擇標準：
  #   1. 不在生產 8 幣種中（BTCUSDT/ETHUSDT/SOLUSDT/BNBUSDT/DOGEUSDT/ADAUSDT/AVAXUSDT/LINKUSDT）
  #   2. 不在任何研究腳本的 symbol list 中
  #   3. 有足夠歷史數據（>= 5 年）和流動性
  #   4. 非核心幣種（不是 BTC/ETH）
  #
  # ⚠️ 注意：AVAXUSDT 是生產幣種，不能做 embargo！
  symbol:
    enabled: true
    embargo_symbols: ["DOTUSDT", "ATOMUSDT"]
    # DOTUSDT: 5.5yr, 48K bars — 僅出現在舊 R3C universe（已棄用），未在簡化策略研究中使用
    # ATOMUSDT: 6.0yr, 53K bars — 僅出現在 build_universe 候選列表，從未被研究
    # 研究/ablation 只用其餘 symbols
    # validation 時用 embargo symbols 測試策略泛化能力
