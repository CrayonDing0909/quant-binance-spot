# ═══════════════════════════════════════════════════════════════
# Polymarket 15-Minute Bot — Krajekis 5-Layer Strategy v2
# ═══════════════════════════════════════════════════════════════
# Source: @krajekis via @lqp2021
# Layers: Session → Volatility → Price Structure → Timing → Risk
# ═══════════════════════════════════════════════════════════════

coins:
  - BTC
  - ETH
  - SOL

# Volatility thresholds (15-minute ATR in USD)
volatility:
  btc_low_threshold: 40
  btc_high_threshold: 100
  eth_low_threshold: 2.0
  eth_high_threshold: 5.0
  sol_low_threshold: 0.3
  sol_high_threshold: 1.0

# Entry timing within 15-minute window
entry_window:
  sweet_spot_start: 600    # enter after 5 min passed (10 min remaining)
  sweet_spot_end: 120      # don't enter with <2 min left

# Price targets by scenario
pricing:
  trend_follow:
    min_price: 0.65        # buy at 65-95¢ (low vol, high probability)
    max_price: 0.95
  mean_reversion:
    min_price: 0.02        # buy at 2-25¢ (high vol, high payoff)
    max_price: 0.25

# Risk management
risk:
  bet_size_usdc: 1.0
  max_daily_losses: 3
  max_daily_trades: 15
  max_positions: 2

# Polling
poll_interval_seconds: 30

# Mode
dry_run: true

# Logging
log_dir: "logs/polymarket"
