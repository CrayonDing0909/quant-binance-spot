# ═══════════════════════════════════════════════════════════════
# Polymarket 15-Minute Bot — Krajekis 5-Layer Strategy v2
# ═══════════════════════════════════════════════════════════════
# Source: @krajekis via @lqp2021
# Layers: Session → Volatility → Price Structure → Timing → Risk
# ═══════════════════════════════════════════════════════════════

coins:
  - BTC
  - ETH
  - SOL

# Volatility thresholds (15-minute ATR in USD)
volatility:
  btc_low_threshold: 80       # was 40 — BTC normal 15m range is $50-100
  btc_high_threshold: 200     # was 100 — only extreme moves count as "high vol"
  eth_low_threshold: 3.0      # was 2.0
  eth_high_threshold: 8.0     # was 5.0
  sol_low_threshold: 0.5      # was 0.3
  sol_high_threshold: 2.0     # was 1.0

# Entry timing within 15-minute window
entry_window:
  sweet_spot_start: 600    # enter after 5 min passed (10 min remaining)
  sweet_spot_end: 120      # don't enter with <2 min left

# Simple contrarian (v3.1 — matches backtest with real PM odds)
# Buy whichever PM side is < cheap_threshold
cheap_threshold: 0.35      # buy when PM prices side < $0.35 (odds > 2.9:1)
trend_filter_pct: 0.5      # skip if Binance displacement > 0.5% (obvious trend)

# Risk management
risk:
  bet_size_usdc: 1.0
  max_daily_losses: 3
  max_daily_trades: 15
  max_positions: 2

# Polling
poll_interval_seconds: 30

# Mode
dry_run: true

# Logging
log_dir: "logs/polymarket"
