# ═══════════════════════════════════════════════════════════════
# Polymarket 15-Minute Bot — Krajekis 5-Layer Strategy v2
# ═══════════════════════════════════════════════════════════════
# Source: @krajekis via @lqp2021
# Layers: Session → Volatility → Price Structure → Timing → Risk
# ═══════════════════════════════════════════════════════════════

# v4: ETH only — PM misprices ETH more than BTC/SOL
coins:
  - ETH

# Volatility thresholds (15-minute ATR in USD)
volatility:
  btc_low_threshold: 80       # was 40 — BTC normal 15m range is $50-100
  btc_high_threshold: 200     # was 100 — only extreme moves count as "high vol"
  eth_low_threshold: 3.0      # was 2.0
  eth_high_threshold: 8.0     # was 5.0
  sol_low_threshold: 0.5      # was 0.3
  sol_high_threshold: 2.0     # was 1.0

# Entry timing within 15-minute window
entry_window:
  sweet_spot_start: 510    # enter at t=6.5min (8.5 min remaining)
  sweet_spot_end: 420      # stop at t=8min (7 min remaining) — narrow window around t=7

# v5: Two strategies — Momentum (t=5, all hours) + Contrarian (t=7, London/NY)

# Strategy A: Momentum — buy leading side if not too expensive
# Backtest: ETH t=5 max$0.65: 319 trades, 63.6% WR, +$35.4 PnL
momentum_min_price: 0.55    # skip if < $0.55 (too close to 50/50, no edge)
momentum_max_price: 0.65    # skip if > $0.65 (too expensive, low payoff)
momentum_start: 630         # t=4.5min (10.5min remaining)
momentum_end: 540           # t=6min (9min remaining)

# Strategy B: Contrarian — buy "slightly cheap" side in London/NY only
# Based on 2178-market backtest with real PM odds:
#   - Edge exists at $0.35-$0.45 (NOT < $0.35 — PM is too accurate there)
#   - London (UTC 7-12) has strongest edge (+$0.209/trade)
#   - t=7min is optimal entry (t=5 and t=3 both lose)
cheap_threshold_low: 0.35   # don't buy below this (PM is right at extremes)
cheap_threshold_high: 0.45  # don't buy above this (too close to 50/50, no edge)
trend_filter_pct: 0.5
# Session filter: only trade during these UTC hours
active_hours_start: 7       # London open
active_hours_end: 17        # NY close

# Risk management
risk:
  bet_size_usdc: 1.0
  max_daily_losses: 3
  max_daily_trades: 15
  max_positions: 2

# Polling
poll_interval_seconds: 30

# Mode
dry_run: true

# Logging
log_dir: "logs/polymarket"
