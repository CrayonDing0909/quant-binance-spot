# ═══════════════════════════════════════════════════════════════
# Polymarket 15-Minute Contrarian Bot
# ═══════════════════════════════════════════════════════════════
# Strategy: Mean reversion on 15-minute Up/Down markets
# Edge: Maker orders (0% fee) + crowd overreaction at extremes
# ═══════════════════════════════════════════════════════════════

coins:
  - BTC
  - ETH
  - SOL

# Bet sizing
bet_size_usdc: 1.0
max_positions: 3

# Entry thresholds
max_price: 0.45         # Only buy shares cheaper than this (odds > 2.2:1)
min_price: 0.02         # Skip if too cheap (near resolution)
min_time_remaining: 120 # Don't enter with <2 min left

# Exit
take_profit: 0.10       # +$0.10 per share
stop_loss: 0.05         # -$0.05 per share

# Polling
poll_interval_seconds: 30  # Check every 30 seconds

# Mode
dry_run: true

# Logging
log_dir: "logs/polymarket"
