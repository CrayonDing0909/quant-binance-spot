# ═══════════════════════════════════════════════════════════════
# PRODUCTION CANDIDATE — Simplified v2 (HTF Filter v2 + LSR, 6-Symbol Trimmed)
# ═══════════════════════════════════════════════════════════════
# Created: 2026-02-28
# Origin: config/research_simplified_prod_candidate.yaml (Config E)
# Baseline: config/prod_candidate_htf_lsr.yaml (current production, SR=3.77)
# Lineage: tsmom_carry_v2 → meta_blend → HTF Filter v2 → HTF Filter v2 + LSR → Simplified
#
# CHANGE vs BASELINE (prod_candidate_htf_lsr.yaml):
#   1. REMOVED: BTC breakout_vol_atr (20 params, negative contribution Δ SR=-0.03)
#   2. REMOVED: dead params (w_tsmom, w_basis_carry) — confirmatory mode doesn't read them
#   3. UNIFIED: SOL/AVAX from tsmom_heavy → default (identical in confirmatory mode)
#   4. KEPT: BTC btc_enhanced (720h, 30/100) — academic support, +0.38 per-sym SR
#   5. REMOVED: ETH eth_enhanced → default (w_tsmom/w_oi/w_fr/w_basis dead in confirmatory)
#   6. KEPT: LINK tsmom_only — regularization (removes unstable carry)
#   Parameter reduction: ~85 → ~45 (47% fewer)
#
# SYMBOL TRIM (2026-03-04):
#   REMOVED: ADAUSDT — structural IC decay, 3 consecutive years negative IC (2024-2026)
#   REMOVED: BNBUSDT — overall IC +0.002, p=0.68, never had statistically significant signal
#   KEPT 6: BTC, ETH, SOL, DOGE, AVAX, LINK
#   Allocation: SOL 0.35→0.40, AVAX 0.35→0.40 (redistribute from removed symbols)
#   Portfolio impact: Return +387%→+406%, MDD 4.99%→4.46%, Calmar 6.80→7.83
#
# STRATEGY SUMMARY:
#   meta_blend, per-symbol routing (2 meaningful tiers):
#     BTC:   100% tsmom_carry_v2 btc_enhanced (720h, 30/100) + HTF daily-dominant
#     ETH/SOL/AVAX/DOGE: 100% tsmom_carry_v2 default + HTF C_hard
#     LINK:  100% tsmom_carry_v2 tsmom_only + HTF C_hard
#   Overlay chain: oi_vol (vol spike protection) → lsr_confirmatory (alpha timing)
#
# VALIDATION RESULTS (2026-03-04, 6-symbol + vol slippage, data 2020-10-01):
#   Portfolio Sharpe:  3.17  (5.4yr, with volume-based slippage model)
#   Total Return:      +288.4%
#   CAGR:              +28.5%
#   Max Drawdown:      -4.40%
#   Calmar:            6.48
#   WFA:               6/6 OOS+, avg degradation -2.7%
#   CPCV (10-split):   PBO avg 3.3%, max 6.7% — ALL 6/6 PASS
#   DSR:               2.22 (p<0.001) → PASS (improved from 1.42)
#   Cross-Asset LOAO:  robust
#   Monte Carlo:       avg VaR95% = 0.21%
#   Cost Stress:       avg SR=1.75 at 2x cost, 6/6 positive
#   Holdout OOS:       avg degradation 6.9%, avg OOS SR=2.23
#   Embargo Holdout:   IS 2.31 → OOS 2.74, 6/6 OOS positive
#   Kelly:             6/6 PASS, all recommend 25% Kelly
#   Pre-Deploy:        10 PASS / 2 FAIL / 1 WARN
#     FAIL: Delay Stress (67.8% drop, inherent to 1h trend-following)
#     FAIL: Alpha Decay (ETH+LINK critical alerts, flagged for P1 review)
#
# ABLATION EVIDENCE (2026-02-28, 5-config study):
#   A (prod, 5 tiers + breakout):  SR 3.77
#   B (all default):               SR 3.57 (Δ -0.20)
#   C (all tsmom_heavy):           SR 3.57 = B (confirms dead params)
#   D (BTC no breakout, default):  SR 3.66 (Δ -0.11)
#   E (this config):               SR 3.85 (Δ +0.08) ← BEST
#   Key finding: BTC breakout is negative alpha (SR 2.02→1.99 when added)
#   Key finding: BTC 720h lookback is real alpha (+0.38 per-sym SR)
#
# DEPLOYMENT:
#   Replaces: prod_candidate_htf_lsr.yaml in meta_blend_live tmux
#   Rollback L1: prod_candidate_htf_lsr.yaml (SR=3.77)
#   Rollback L2: prod_candidate_htf_filter.yaml (SR=2.75)
# ═══════════════════════════════════════════════════════════════

market:
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    # BNBUSDT removed: IC +0.002, p=0.68, never statistically significant
    - DOGEUSDT
    # ADAUSDT removed: structural IC decay, 3yr negative (2024-2026)
    - AVAXUSDT
    - LINKUSDT
  interval: "1h"
  start: "2020-10-01"
  end: null
  market_type: "futures"

futures:
  leverage: 3
  margin_type: "ISOLATED"
  position_mode: "ONE_WAY"
  direction: "both"

strategy:
  name: "meta_blend"
  display_name: "HTF Filter v2 + LSR (Simplified)"
  params:
    # ── Default sub-strategy (SOL, AVAX, DOGE) ──
    # confirmatory mode: w_tsmom / w_basis_carry are dead params (not used)
    sub_strategies:
      - name: "tsmom_carry_v2"
        weight: 1.0
        params:
          combination_mode: "confirmatory"
          tier: "default"
          tsmom_lookback: 168
          tsmom_vol_target: 0.15
          tsmom_ema_fast: 20
          tsmom_ema_slow: 50
          tsmom_agree_weight: 1.0
          tsmom_disagree_weight: 0.3
          basis_ema_fast: 24
          basis_ema_slow: 168
          basis_tanh_scale: 50.0
          fr_rolling_window: 72
          oi_z_window: 168
          basis_carry_fr_weight: 0.7
          basis_carry_basis_weight: 0.3
          carry_agree_scale: 1.0
          carry_disagree_scale: 0.7
          carry_neutral_scale: 0.85
          carry_confirm_smoothing: 24
          composite_ema: 12
          position_step: 0.2       # 2026-03-24: 0.1→0.2 to reduce micro-trades on small account
          min_change_threshold: 0.15  # 2026-03-24: 0.05→0.15 to reduce fee drag
          htf_filter_enabled: true

  symbol_overrides:
    # ── BTC: 80% tsmom_carry_v2 btc_enhanced + 20% lsr_contrarian satellite ──
    # 2026-03-25: Added LSR Contrarian as diversification sleeve
    #   TSMOM SR=2.49, LSR SR=1.52, corr=0.256 → genuine diversification
    #   Long-only satellite: net exp +0.645%, 55.6 tr/yr
    # Academic support: BTC has longer trend cycles due to institutional adoption
    # Ablation evidence: 720h lookback → +0.38 per-sym SR (1.64→2.02)
    BTCUSDT:
      sub_strategies:
        - name: "tsmom_carry_v2"
          weight: 0.80
          params:
            combination_mode: "confirmatory"
            tier: "btc_enhanced"
            tsmom_lookback: 720
            tsmom_ema_fast: 30
            tsmom_ema_slow: 100
            tsmom_vol_target: 0.15
            tsmom_agree_weight: 1.0
            tsmom_disagree_weight: 0.3
            basis_ema_fast: 24
            basis_ema_slow: 168
            basis_tanh_scale: 50.0
            carry_agree_scale: 1.0
            carry_disagree_scale: 0.6
            carry_neutral_scale: 0.85
            carry_confirm_smoothing: 24
            composite_ema: 12
            position_step: 0.2       # 2026-03-24: 0.1→0.2
            min_change_threshold: 0.15  # 2026-03-24: 0.05→0.15
            htf_filter_enabled: true
            htf_4h_ema_fast: 30
            htf_4h_ema_slow: 100
            htf_no_confirm: 0.7
            htf_4h_only_confirm: 0.3
        - name: "lsr_contrarian"
          weight: 0.20
          params:
            # Signal (v3: EW pctrank)
            lsr_type: "lsr"
            lsr_window: 168
            use_ew_pctrank: true
            ew_halflife: 84
            entry_pctile: 0.85
            # Regime gate
            adx_gate_enabled: true
            adx_period: 14
            adx_threshold: 25.0
            # Entry (persist + cooldown)
            persist_bars: 2
            cooldown_bars: 24
            # Exit (midpoint TP)
            tp_mode: "midpoint"
            sl_atr_mult: 3.0
            sl_atr_lookback: 14
            max_hold_bars: 168
            # Role
            long_only: true
            vol_scale_enabled: false

    # ── ETH: inherits default (was eth_enhanced, but 2026-03-04 deep IC review
    #    showed signal correlation = 1.000 vs default — w_tsmom/w_oi/w_fr/w_basis
    #    are dead params in confirmatory mode. Overall IC +0.0004, p=0.94.
    #    Simplifying to default saves 8 params with zero signal change.) ──
    # NOTE: ETH IC is NOT significant. TSMOM factor may not work well on ETH.
    # Monitor 2026 IC recovery (+0.056) with limited data.
    # ETHUSDT: inherits default (no override needed)

    # ── LINK: 100% tsmom_carry_v2 tsmom_only (carry IC unstable) + HTF C_hard ──
    # Removing carry is regularization, not overfitting
    LINKUSDT:
      sub_strategies:
        - name: "tsmom_carry_v2"
          weight: 1.0
          params:
            tier: "tsmom_only"
            tsmom_lookback: 168
            tsmom_vol_target: 0.15
            tsmom_ema_fast: 20
            tsmom_ema_slow: 50
            tsmom_agree_weight: 1.0
            tsmom_disagree_weight: 0.3
            composite_ema: 12
            position_step: 0.2       # 2026-03-24: 0.1→0.2
            min_change_threshold: 0.15  # 2026-03-24: 0.05→0.15
            htf_filter_enabled: true

    # SOL, AVAX, DOGE → inherit default (no overrides needed)
    # BNB, ADA removed from universe (no alpha evidence)

  # ── Overlay: oi_vol + lsr_confirmatory (identical to prod) ──
  overlay:
    enabled: true
    mode: "oi_vol+lsr_confirmatory"
    params:
      oi_extreme_z: 999.0
      oi_reversal_window: 6
      reduce_pct: 0.5
      oi_lookback: 24
      oi_z_window: 168
      vol_spike_z: 2.0
      overlay_cooldown_bars: 12
      trend_lookback: 20
      atr_period: 14
      vol_z_window: 168
      lsr_type: "lsr"
      lsr_window: 168
      lsr_entry_pctile: 0.85
      lsr_scale_boost: 1.3
      lsr_scale_reduce: 0.3
      lsr_min_coverage: 0.3
      lsr_pos_threshold: 0.05
      oi_confirm_enabled: true
      fr_confirm_enabled: true

  # ── Portfolio Regime Gate (market-wide trend regime detection) ──
  # Scales ALL positions based on BTC trend regime.
  # Prevents bleeding during choppy/sideways markets.
  regime_gate:
    enabled: true
    reference_symbol: "BTCUSDT"
    adx_period: 14
    adx_trend_threshold: 25      # ADX >= 25 = trending
    adx_weak_threshold: 15       # ADX >= 15 = weak trend
    efficiency_ratio_lookback: 20
    er_trend_threshold: 0.40     # ER >= 0.40 = efficient/trending
    er_weak_threshold: 0.25      # ER >= 0.25 = weak trend
    scale_trending: 1.0          # full signal
    scale_weak: 0.5              # half signal
    scale_no_trend: 0.3          # 2026-03-25: 0.0→0.3, ablation B best (SR +10.7%, MDD improved)

backtest:
  initial_cash: 10000
  fee_bps: 5
  slippage_bps: 3
  trade_on: "next_open"
  validate_data: true
  clean_data: true
  funding_rate:
    enabled: true
    default_rate_8h: 0.0001
    use_historical: true
  slippage_model:
    enabled: true        # 2026-03-04: enabled for realistic cost modeling
    base_bps: 2.0        # min bid-ask spread
    impact_coefficient: 0.1
    impact_power: 0.5    # square-root model (academic standard)
    adv_lookback: 20     # 20-bar ADV
    participation_rate: 0.10

risk:
  max_drawdown_pct: 0.40

position_sizing:
  method: "fixed"
  position_pct: 1.0

portfolio:
  cash_reserve: 0
  allocation:
    # 2026-03-24 IC-evidence allocation rebalance:
    #   ETH:  0.45→0.15 (IC≈0, p=0.89, never statistically significant)
    #   LINK: 0.35→0.05 (IC reversed to -0.023, 3yr declining, 180% decay)
    #   AVAX: 0.40→0.20 (62% decay, 2025-2026 consecutive negative yearly IC)
    #   SOL:  0.40→0.55 (only symbol with stable positive IC +0.023)
    #   BTC:  0.45→0.45 (unchanged, marginal but overall positive IC)
    #   DOGE: 0.35→0.35 (unchanged, recent IC positive but 2026 yearly IC warning)
    BTCUSDT: 0.45
    ETHUSDT: 0.15
    SOLUSDT: 0.55
    DOGEUSDT: 0.35
    AVAXUSDT: 0.20
    LINKUSDT: 0.05

live:
  kline_cache: true
  flip_confirmation: false
  prefer_limit_order: true
  limit_order_timeout_s: 10

  rebalance_band:
    enabled: true
    threshold_pct: 0.05    # 2026-03-24: 0.03→0.05 to reduce micro-adjustments on small account
    apply_on_same_direction_only: true

  symbol_governance:
    enabled: true
    review_frequency: "weekly"
    warmup_days: 14
    quarantine_min_days: 14
    consecutive_reviews_for_quarantine: 2
    consecutive_reviews_for_recovery: 2
    artifacts_dir: "reports/symbol_governance"

    thresholds:
      edge_sharpe_deweight: 0.3
      edge_sharpe_quarantine: 0.0
      edge_sharpe_recover_active: 0.8
      edge_sharpe_recover_from_quarantine: 0.5
      edge_per_turnover_min: 0.0
      slippage_ratio_deweight: 1.5
      slippage_ratio_quarantine: 1.8
      slippage_ratio_recover_active: 1.2
      slippage_ratio_recover_from_quarantine: 1.3
      consistency_min: 99.0
      consistency_recover: 99.5
      missed_signals_quarantine: 5.0
      dd_quarantine_pct: 25.0

    weights:
      active_multiplier: 1.0
      deweight_multiplier: 0.5
      quarantine_multiplier: 0.0
      min_weight: 0.03
      max_weight: 0.20

  watchdog:
    enabled: true
    interval_sec: 300
    alert_cooldown_sec: 1800
    startup_grace_sec: 300
    runner_ready_grace_sec: 180
    heartbeat_warn_sec: 90
    heartbeat_critical_sec: 180
    ws_msg_warn_sec: 180
    ws_msg_critical_sec: 300
    data_warn_age_sec:
      "1h": 7200
      "5m": 1800
    data_critical_age_sec:
      "1h": 14400
      "5m": 3600
    error_window_minutes: 15
    error_warn_count: 5
    error_critical_count: 12

notification:
  telegram_bot_token: ${FUTURES_TELEGRAM_BOT_TOKEN}
  telegram_chat_id: ${FUTURES_TELEGRAM_CHAT_ID}
  prefix: "🚀 [SIMPLIFIED]"
  enabled: true

output:
  report_dir: "./reports"
